description: >-
  Labcorp helps patients, providers, organizations, and biopharma companies guide
  vital healthcare decisions every day. Labcorp supports HL7 / FHIR-based integration
  for laboratory orders and results exchange with electronic health record (EHR)
  systems, but does not publish a fully open public developer portal; access is
  granted through health-system and biopharma integration agreements.
apis:
  - aid: labcorp:labcorp-fhir-api
    name: Labcorp FHIR API
    tags:
      - FHIR
      - HL7
      - Healthcare
      - Interoperability
      - Laboratory
    humanURL: https://www.labcorp.com/organizations/health-systems
    description: >-
      Labcorp supports HL7 FHIR-based exchange of laboratory orders, results, and
      diagnostic reports with provider and health-system EHR systems. The interface
      typically exposes FHIR resources such as ServiceRequest, DiagnosticReport,
      Observation, Patient, Practitioner, Specimen, and Organization. Access is
      provisioned through Labcorp integration services rather than a self-service
      developer portal.
    properties:
      - url: https://www.labcorp.com/organizations/health-systems
        type: Documentation
      - url: https://www.labcorp.com/help/contact-us
        type: Support
  - aid: labcorp:labcorp-link-api
    name: Labcorp Link Provider Integration
    tags:
      - EHR
      - Healthcare
      - Orders
      - Results
    humanURL: https://www.labcorp.com/labcorp-link
    description: >-
      Labcorp Link is the provider-facing platform for ordering laboratory tests
      and receiving results. EHR-integrated workflows are supported via Labcorp's
      integration team using HL7 v2 and FHIR-based interfaces.
    properties:
      - url: https://www.labcorp.com/labcorp-link
        type: Documentation
      - url: https://www.labcorp.com/help/contact-us
        type: Support
