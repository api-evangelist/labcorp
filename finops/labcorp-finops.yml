specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Labcorp
providerId: labcorp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Healthcare
  - FHIR
  - Diagnostics
description: 'FOCUS-aligned FinOps for Labcorp connectivity: integrations are bundled inside the broader
  laboratory-services or biopharma master agreement, so there is no per-API line item to FOCUS-map. FinOps
  signal at the integration layer therefore comes from message and transaction volume that the consumer
  measures internally and reconciles against laboratory-services invoices.'
sources:
  - https://www.labcorp.com/
notes: No public unit pricing for the API surface itself; cost is bundled in the laboratory-services
  agreement.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Laboratory Corporation of America Holdings
serviceCategory: Healthcare / Diagnostics
billingModel:
  pricingCategory: Bundled into Laboratory Services Agreement
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Labcorp Connectivity
  ServiceCategory: Healthcare / Diagnostics
  ProviderName: Labcorp
  PublisherName: Laboratory Corporation of America Holdings
  InvoiceIssuerName: Laboratory Corporation of America Holdings
  BillingCurrency: USD
meters:
  - name: hl7_messages
    unit: message
    aggregation: sum
    dimensions:
      - message_type
      - facility
  - name: fhir_requests
    unit: request
    aggregation: sum
    dimensions:
      - resource_type
      - facility
  - name: lab_orders
    unit: order
    aggregation: sum
    dimensions:
      - facility
      - test_panel
  - name: lab_results
    unit: result
    aggregation: sum
    dimensions:
      - facility
      - test_panel
principles:
  - name: Visibility
    description: Capture HL7 v2 message and FHIR request counts at the interface engine; correlate volumes
      with the laboratory-services invoice line items.
  - name: Allocation
    description: Tag traffic with originating facility, ordering provider, and program (e.g. employee
      health, hospital outpatient) to support internal cost allocation against the Labcorp agreement.
  - name: Optimization
    description: Use standing orders and reflex testing rules to reduce duplicate orders; consolidate
      panels; route low-acuity orders to lower-cost test menus.
  - name: Accountability
    description: Health-system informatics and revenue-cycle teams jointly own integration cost; review
      Labcorp invoices against measured order/result counts monthly.
maintainers:
