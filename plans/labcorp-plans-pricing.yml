specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Labcorp
providerId: labcorp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - FHIR
  - HL7
  - Diagnostics
  - Laboratory
description: Labcorp does not operate a public commercial developer portal. Connectivity to Labcorp
  for laboratory orders and results exchange is provided through HL7 v2 / FHIR integrations negotiated
  under health-system connectivity agreements (EHR vendors, hospital networks) or biopharma master service
  agreements; no per-call API pricing is published.
sources:
  - https://www.labcorp.com/
notes: Access is contract-driven through Labcorp's connectivity-solutions team rather than self-serve;
  no public price list. Integration is generally bundled into the broader laboratory-services agreement.
plans:
  - id: labcorp-ehr-connectivity
    name: EHR / Health-System Connectivity
    type: enterprise
    description: HL7 v2 / FHIR-based connectivity for laboratory orders and results exchange between
      Labcorp and health-system EHR vendors. Negotiated as part of the broader connectivity agreement;
      no per-call pricing.
    entries:
      - label: Connectivity agreement
        name: ehr_connectivity
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: HL7 v2 ORM / ORU messages
      - name: FHIR R4 lab order / result exchange
      - name: Patient identity matching
      - name: Result delivery to EHR inbox
  - id: labcorp-biopharma
    name: Biopharma / CRO Integration
    type: enterprise
    description: Programmatic data exchange tied to Labcorp's drug-development services (Covance / Labcorp
      Drug Development). Governed by the master service agreement; no per-call pricing.
    entries:
      - label: Biopharma MSA
        name: biopharma_msa
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: Clinical-trial data exchange
      - name: Sample tracking and chain-of-custody
      - name: Tabulated result delivery
maintainers:
