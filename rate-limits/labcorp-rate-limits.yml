specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Labcorp
providerId: labcorp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Healthcare
  - FHIR
  - HL7
description: Labcorp does not publish a public API rate-limits document. Integration limits are governed
  by the connectivity agreement and the underlying HL7 v2 / FHIR endpoint capacity provisioned for the
  health-system or biopharma partner.
sources:
  - https://www.labcorp.com/
notes: No public rate-limit documentation. HL7 v2 message exchange is typically batched and queued rather
  than real-time per-second rate-limited; FHIR endpoints follow generic 429 throttling.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: HL7 v2 message exchange
    scope: connection
    metric: varies
    limit: 'governed by interface engine throughput; no published numeric limit'
  - name: FHIR endpoint
    scope: account
    metric: varies
    limit: 'undocumented; confirm with Labcorp connectivity team'
policies:
  - name: HIPAA + PHI safety
    description: All requests carry PHI; consumers must follow HIPAA business-associate-agreement obligations,
      including audit logging, encryption in transit and at rest, and minimum-necessary access patterns.
  - name: Interface engine queuing
    description: HL7 v2 traffic is typically delivered through MLLP / VPN to the partner's interface
      engine; bursts are queued rather than rejected.
  - name: Backoff Strategy
    description: Honor Retry-After when present; otherwise apply exponential backoff with jitter on 429/503
      responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
